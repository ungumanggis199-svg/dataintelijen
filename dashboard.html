<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Intelijen KN Muna</title>

<link rel="stylesheet" href="dashboard.css">
</head>

<body>

<!-- TOP BAR -->
<header class="topbar">

  <!-- LEFT -->
  <div class="brand">
    <img src="https://raw.githubusercontent.com/ungumanggis199-svg/dataintelijen/main/Logo-Kejaksaan2.png">
    <div class="brand-text">
      <div class="title-small">Kejaksaan RI</div>
      <div class="title-bold">Kejaksaan Negeri Muna</div>
    </div>
  </div>

  <!-- CENTER TITLE -->
  <div class="center-title">
    Intelijen <br>
    <span>Kejaksaan Negeri Muna</span>
  </div>

  <!-- RIGHT (optional user) -->
  <div class="user-box">
    <div class="user">Admin</div>
  </div>

</header>

<!-- MAIN -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <button class="menu active">Capaian Kinerja</button>
    <button class="menu">Aplikasi Intelijen</button>
    <button class="menu">Peralatan Intelijen</button>
    <button class="menu">Pelaporan Intelijen</button>

  </aside>

  <!-- CONTENT -->
  <main class="content">

    <!-- HERO CARD -->
    <div class="hero">
      <h2>Dashboard Intelijen</h2>
      <p>Monitoring kegiatan intelijen Kejaksaan Negeri Muna</p>
    </div>

    <!-- CARDS -->
    <div class="cards">

      <div class="card">
        <h4>Total Kegiatan</h4>
        <h2>48</h2>
      </div>

      <div class="card">
        <h4>Laporan Intelijen</h4>
        <h2>32</h2>
      </div>

      <div class="card">
        <h4>Operasi / Kegiatan</h4>
        <h2>15</h2>
      </div>

      <div class="card">
        <h4>Capaian Tahun Ini</h4>
        <h2>76%</h2>
      </div>

    </div>

    <!-- MAIN PANEL -->
    <div class="panel">

      <h3>Capaian Kinerja Bulanan</h3>

      <div class="chart">
        <div class="bar" style="height:40%"></div>
        <div class="bar" style="height:55%"></div>
        <div class="bar" style="height:65%"></div>
        <div class="bar" style="height:50%"></div>
        <div class="bar" style="height:70%"></div>
        <div class="bar" style="height:80%"></div>
      </div>

    </div>

  </main>

</div>

</body>
</html>
